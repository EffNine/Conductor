# Canonical Fly config lives at the repo root: ../fly.toml
# Deploy from the repository root so the Docker build context is correct:
#
#   fly deploy
#   # or
#   ./scripts/fly-deploy.sh
#
# This file is kept for backwards compatibility with docs that reference
# deployments/fly.toml. Prefer the root fly.toml.

app = "novexa-gateway"
primary_region = "sin"

[build]
  # NOTE: only correct when build context is the repo root
  # (fly deploy . -c deployments/fly.toml). Prefer root fly.toml instead.
  dockerfile = "deployments/Dockerfile"

[env]
  NOVEXA_SERVER_PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

[mounts]
  source = "novexa_data"
  destination = "/app/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
