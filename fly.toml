# fly.toml app configuration file generated for conductor-yknfkg on 2026-07-22T14:24:51Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'conductor-yknfkg'
primary_region = 'sin'

[build]
  dockerfile = 'deployments/Dockerfile'

[env]
  CONDUCTOR_SERVER_PORT = '8080'
  # curated_only applies to ALL providers: any with providers.*.models (or
  # CONDUCTOR_PROVIDERS_*_MODELS) use that allowlist; others stay dynamic.
  # NIM gets a built-in short allowlist when its models list is empty so Fly
  # does not advertise ~180 NIM endpoints. Override with
  # CONDUCTOR_PROVIDERS_NVIDIA_NIM_MODELS or config.yaml.
  CONDUCTOR_CATALOG_CURATED_ONLY = 'true'
  # Probe all registered providers (default). Loopback ollama/lmstudio are
  # skipped in code. With curated NIM the pass stays small and finishes quickly.

[[mounts]]
  source = 'conductor_data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
