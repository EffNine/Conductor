linters:
  enable:
    - gofmt
    - govet
    - errcheck
    - staticcheck
    - gosimple
    - ineffassign
    - typecheck
    - unused
    - misspell
    - revive
    - gosec
    - unconvert
    - prealloc

linters-settings:
  govet:
    check-shadowing: true
  gosec:
    excludes:
      - G107  # Potential HTTP request made with variable URL
      - G404  # math/rand is acceptable for non-security retry backoff jitter
  revive:
    rules:
      - name: exported
        severity: warning

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - gosec
    # ProviderError is an intentional, widely-used name across the provider
    # packages; the revive "stutter" suggestion does not apply here.
    - path: internal/provider/interface\.go
      linters:
        - revive
      text: "stutters"

run:
  timeout: 5m
  tests: true
